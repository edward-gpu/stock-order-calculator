<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>挂单价格测算表</title>
  <style>
    :root {
      --blue: #1f4e79;
      --blue-2: #305496;
      --label: #d9eaf7;
      --input: #fff2cc;
      --panel: #f3f6fa;
      --line: #cfdcf3;
      --text: #172033;
      --muted: #64748b;
      --focus: #ffff00;
      --page: #eef3f8;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--page);
      color: var(--text);
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
    }

    main {
      width: min(1280px, calc(100% - 32px));
      margin: 24px auto;
      background: var(--white);
      border: 1px solid #d7e0ef;
      box-shadow: 0 18px 45px rgba(23, 32, 51, 0.08);
    }

    .title {
      margin: 0;
      padding: 20px 24px;
      background: var(--blue);
      color: var(--white);
      text-align: center;
      font-size: clamp(28px, 4vw, 42px);
      line-height: 1.15;
      font-family: SimSun, "Songti SC", serif;
      font-weight: 700;
      letter-spacing: 0;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 16px 18px 0;
      overflow-x: auto;
    }

    .tab {
      border: 1px solid #bed0e8;
      background: #f7fafc;
      color: #17365d;
      min-width: 84px;
      height: 38px;
      padding: 0 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab.active {
      background: var(--blue-2);
      border-color: var(--blue-2);
      color: var(--white);
    }

    .sheet { padding: 18px; }

    .summary {
      display: grid;
      grid-template-columns: 170px minmax(130px, 1fr) 170px minmax(150px, 1fr) 170px minmax(150px, 1fr);
      border: 1px solid #111827;
      border-bottom: 0;
    }

    .cell {
      min-height: 62px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1px solid #111827;
      border-bottom: 1px solid #111827;
      padding: 9px;
      font-size: 20px;
      line-height: 1.25;
    }

    .cell:nth-child(6n) { border-right: 0; }

    .label {
      background: var(--label);
      color: #17365d;
      font-weight: 800;
      text-align: center;
    }

    .input-cell { background: var(--input); }

    .info-cell {
      background: var(--panel);
      color: #334155;
      justify-content: flex-end;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .entry {
      width: 100%;
      height: 42px;
      border: 0;
      outline: 0;
      background: transparent;
      color: #111827;
      text-align: center;
      font: inherit;
    }

    .info-cell .entry { text-align: right; }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0 12px;
      color: var(--muted);
      font-size: 14px;
    }

    .checks {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .checks label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #334155;
      cursor: pointer;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    button {
      height: 34px;
      border: 1px solid #b7c8df;
      background: #ffffff;
      color: #17365d;
      padding: 0 12px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { background: #edf5ff; }

    .table-wrap {
      width: 100%;
      overflow-x: auto;
    }

    table {
      width: 100%;
      min-width: 980px;
      border-collapse: collapse;
      table-layout: fixed;
      border-left: 1px solid var(--blue-2);
      border-right: 1px solid var(--blue-2);
      border-bottom: 3px solid var(--blue-2);
    }

    th {
      background: var(--blue-2);
      color: var(--white);
      font-size: 22px;
      padding: 13px 8px;
      border-right: 2px solid #dbe7fb;
      text-align: center;
      white-space: nowrap;
    }

    th:last-child { border-right: 0; }

    td {
      height: 58px;
      border: 1px solid var(--line);
      text-align: center;
      font-size: 21px;
      font-variant-numeric: tabular-nums;
      background: var(--white);
    }

    td.price {
      text-align: right;
      padding-right: 18px;
    }

    td.note input {
      width: 100%;
      height: 46px;
      border: 0;
      background: transparent;
      text-align: center;
      font: inherit;
      outline: 0;
    }

    tr.highlight td.level,
    tr.highlight td.down-price,
    tr.highlight td.up-price {
      background: var(--focus);
    }

    .tip {
      margin: 22px 0 0;
      padding: 13px 12px 15px;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
      color: var(--muted);
      text-align: center;
      font-size: 20px;
      font-style: italic;
      line-height: 1.35;
    }

    @media print {
      body { background: #ffffff; }
      main {
        width: 100%;
        margin: 0;
        border: 0;
        box-shadow: none;
      }
      .tabs, .toolbar, .actions { display: none; }
      table { min-width: 0; }
    }

    @media (max-width: 900px) {
      main {
        width: 100%;
        margin: 0;
        border-left: 0;
        border-right: 0;
      }

      .sheet { padding: 12px; }

      .summary {
        grid-template-columns: 124px minmax(126px, 1fr);
      }

      .cell {
        min-height: 54px;
        font-size: 17px;
      }

      .cell:nth-child(6n) { border-right: 1px solid #111827; }
      .cell:nth-child(2n) { border-right: 0; }

      th {
        font-size: 16px;
        padding: 10px 8px;
      }

      td {
        height: 52px;
        font-size: 17px;
      }

      td.price { padding-right: 12px; }
      .tip { font-size: 16px; }
    }
  </style>
</head>
<body>
  <main>
    <h1 class="title" id="pageTitle">NVDA挂单价格测算表</h1>
    <nav class="tabs" id="tabs" aria-label="股票列表"></nav>
    <section class="sheet">
      <div class="summary">
        <div class="cell label">股票代码</div>
        <div class="cell input-cell"><input class="entry" id="symbol" aria-label="股票代码"></div>
        <div class="cell label">日期</div>
        <div class="cell info-cell"><input class="entry" id="dateText" aria-label="日期"></div>
        <div class="cell label">单位</div>
        <div class="cell info-cell">USD</div>

        <div class="cell label">昨日收盘价</div>
        <div class="cell input-cell"><input class="entry" id="closePrice" aria-label="昨日收盘价" inputmode="decimal"></div>
        <div class="cell label">持仓总额</div>
        <div class="cell info-cell"><input class="entry" id="positionValue" aria-label="持仓总额" inputmode="decimal"></div>
        <div class="cell label">分红金额</div>
        <div class="cell input-cell"><input class="entry" id="dividendValue" aria-label="分红金额" inputmode="decimal"></div>

        <div class="cell label">价格小数位</div>
        <div class="cell input-cell"><input class="entry" id="decimals" aria-label="价格小数位" inputmode="numeric"></div>
        <div class="cell label">持仓股数</div>
        <div class="cell info-cell"><input class="entry" id="shares" aria-label="持仓股数" inputmode="decimal"></div>
        <div class="cell label">合并金额</div>
        <div class="cell info-cell" id="combinedValue">$0.00</div>

        <div class="cell label">持仓单价</div>
        <div class="cell info-cell" id="avgCost">$0.00</div>
        <div class="cell label">说明</div>
        <div class="cell info-cell" style="grid-column: span 3; justify-content: center; text-align: center;">合并金额 = 持仓总额 + 分红金额</div>
      </div>

      <div class="toolbar">
        <div class="checks" id="highlightChecks" aria-label="关注档位"></div>
        <div class="actions">
          <button type="button" id="addCurrent">保存为当前股票</button>
          <button type="button" id="printPage">打印</button>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width: 10%;">档位</th>
              <th style="width: 14%;">下浮比例</th>
              <th style="width: 18%;">下浮挂单价</th>
              <th style="width: 14%;">上浮比例</th>
              <th style="width: 18%;">上浮测算价</th>
              <th style="width: 26%;">备注</th>
            </tr>
          </thead>
          <tbody id="priceRows"></tbody>
        </table>
      </div>

      <p class="tip">提示：本表仅用于价格测算，不构成投资建议。金额单位统一为美金 USD；如需 3 位小数，可修改价格小数位。</p>
    </section>
  </main>

  <script>
    const stocks = [
      { symbol: "NVDA", closePrice: 214.50, decimals: 2, positionValue: 7292.11, dividendValue: 0, shares: 34, dateText: "20260709", notes: {} },
      { symbol: "MRVL", closePrice: 231.71, decimals: 2, positionValue: 1659.01, dividendValue: 0, shares: 10, dateText: "20260709", notes: {} },
      { symbol: "DRAM", closePrice: 62.04, decimals: 2, positionValue: 994.16, dividendValue: 0, shares: 15, dateText: "20260709", notes: {} },
      { symbol: "BSTZ", closePrice: 28.61, decimals: 2, positionValue: 2173, dividendValue: 0, shares: 78, dateText: "20260709", notes: {} },
      { symbol: "空白", closePrice: 0, decimals: 2, positionValue: 0, dividendValue: 0, shares: 0, dateText: "20260709", notes: {} }
    ];

    const state = {
      currentIndex: 0,
      highlights: new Set([1, 3, 5])
    };

    const els = {
      pageTitle: document.getElementById("pageTitle"),
      tabs: document.getElementById("tabs"),
      symbol: document.getElementById("symbol"),
      closePrice: document.getElementById("closePrice"),
      decimals: document.getElementById("decimals"),
      positionValue: document.getElementById("positionValue"),
      dividendValue: document.getElementById("dividendValue"),
      shares: document.getElementById("shares"),
      dateText: document.getElementById("dateText"),
      avgCost: document.getElementById("avgCost"),
      combinedValue: document.getElementById("combinedValue"),
      priceRows: document.getElementById("priceRows"),
      highlightChecks: document.getElementById("highlightChecks"),
      addCurrent: document.getElementById("addCurrent"),
      printPage: document.getElementById("printPage")
    };

    function numberValue(value, fallback = 0) {
      const cleaned = String(value ?? "").replace(/[$,]/g, "").trim();
      const num = Number(cleaned);
      return Number.isFinite(num) ? num : fallback;
    }

    function roundLikeExcel(value, decimals) {
      const factor = 10 ** decimals;
      return Math.round((value + 1e-10) * factor) / factor;
    }

    function formatNumber(value, decimals = 2) {
      return Number(value).toLocaleString("en-US", {
        minimumFractionDigits: decimals,
        maximumFractionDigits: decimals
      });
    }

    function formatUsd(value, decimals = 2) {
      return `$${formatNumber(value, decimals)}`;
    }

    function getNotesFromRows() {
      const notes = { ...(stocks[state.currentIndex]?.notes || {}) };
      document.querySelectorAll("[data-note-level]").forEach((input) => {
        const value = input.value.trim();
        if (value) {
          notes[input.dataset.noteLevel] = value;
        } else {
          delete notes[input.dataset.noteLevel];
        }
      });
      return notes;
    }

    function currentInput() {
      const decimals = Math.max(0, Math.min(6, Math.round(numberValue(els.decimals.value, 2))));
      return {
        symbol: els.symbol.value.trim() || "空白",
        closePrice: numberValue(els.closePrice.value),
        decimals,
        positionValue: numberValue(els.positionValue.value),
        dividendValue: numberValue(els.dividendValue.value),
        shares: numberValue(els.shares.value),
        dateText: els.dateText.value.trim(),
        notes: getNotesFromRows()
      };
    }

    function persistCurrentInputs() {
      stocks[state.currentIndex] = currentInput();
    }

    function loadStock(index) {
      state.currentIndex = index;
      const stock = stocks[index];
      els.symbol.value = stock.symbol;
      els.closePrice.value = stock.closePrice ? stock.closePrice.toFixed(stock.decimals) : "";
      els.decimals.value = stock.decimals;
      els.positionValue.value = stock.positionValue ? formatNumber(stock.positionValue, 2) : "";
      els.dividendValue.value = stock.dividendValue ? formatNumber(stock.dividendValue, 2) : "";
      els.shares.value = stock.shares ? formatNumber(stock.shares, 2) : "";
      els.dateText.value = stock.dateText || "";
      renderAll();
    }

    function saveCurrent() {
      const stock = currentInput();
      const existing = stocks.findIndex((item, index) => {
        return index !== state.currentIndex && item.symbol.toUpperCase() === stock.symbol.toUpperCase();
      });
      if (existing >= 0) {
        stocks[existing] = stock;
        state.currentIndex = existing;
      } else {
        stocks[state.currentIndex] = stock;
      }
      renderAll();
    }

    function renderTabs() {
      els.tabs.innerHTML = "";
      stocks.forEach((stock, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `tab${index === state.currentIndex ? " active" : ""}`;
        button.textContent = stock.symbol || "空白";
        button.addEventListener("click", () => {
          persistCurrentInputs();
          loadStock(index);
        });
        els.tabs.appendChild(button);
      });
    }

    function renderHighlightChecks() {
      els.highlightChecks.innerHTML = "<strong>关注档位</strong>";
      for (let level = 1; level <= 15; level += 1) {
        const label = document.createElement("label");
        const input = document.createElement("input");
        input.type = "checkbox";
        input.checked = state.highlights.has(level);
        input.addEventListener("change", () => {
          input.checked ? state.highlights.add(level) : state.highlights.delete(level);
          renderTable();
        });
        label.append(input, document.createTextNode(String(level)));
        els.highlightChecks.appendChild(label);
      }
    }

    function renderHeader() {
      const stock = currentInput();
      const titleSymbol = stock.symbol || "空白";
      const avgCost = stock.shares ? stock.positionValue / stock.shares : 0;
      const combined = stock.positionValue + stock.dividendValue;
      els.pageTitle.textContent = `${titleSymbol}挂单价格测算表`;
      els.avgCost.textContent = formatUsd(avgCost, stock.decimals);
      els.combinedValue.textContent = formatUsd(combined, 2);
    }

    function renderTable() {
      const stock = currentInput();
      els.priceRows.innerHTML = "";
      for (let level = 1; level <= 15; level += 1) {
        const downRate = level / 100;
        const upRate = level / 100;
        const downPrice = roundLikeExcel(stock.closePrice * (1 - downRate), stock.decimals);
        const upPrice = roundLikeExcel(stock.closePrice * (1 + upRate), stock.decimals);
        const note = stock.notes[String(level)] || "";
        const tr = document.createElement("tr");
        if (state.highlights.has(level)) tr.className = "highlight";
        tr.innerHTML = `
          <td class="level">${level}</td>
          <td>-${level}%</td>
          <td class="price down-price">${formatUsd(downPrice, stock.decimals)}</td>
          <td>+${level}%</td>
          <td class="price up-price">${formatUsd(upPrice, stock.decimals)}</td>
          <td class="note"><input data-note-level="${level}" aria-label="第${level}档备注" value="${note}"></td>
        `;
        els.priceRows.appendChild(tr);
      }
    }

    function renderAll() {
      renderTabs();
      renderHighlightChecks();
      renderHeader();
      renderTable();
    }

    [els.symbol, els.closePrice, els.decimals, els.positionValue, els.dividendValue, els.shares, els.dateText].forEach((input) => {
      input.addEventListener("input", () => {
        renderHeader();
        renderTable();
      });
    });

    els.addCurrent.addEventListener("click", saveCurrent);
    els.printPage.addEventListener("click", () => window.print());

    loadStock(0);
  </script>
</body>
</html>
